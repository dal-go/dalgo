name: No breaking-change commits (pre-1.0)

# Backstop for the pre-push hook: rejects conventional-commit breaking-change
# markers (type!: or a "BREAKING CHANGE:" footer) so the release tooling never
# bumps v0.x -> v1.0.0 while the module is pre-1.0. Catches commits pushed with
# --no-verify or by contributors without the hook enabled.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  no-breaking-change:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Determine commit range
        id: range
        env:
          EVENT: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            echo "range=$PR_BASE..$PR_HEAD" >> "$GITHUB_OUTPUT"
          else
            case "$PUSH_BEFORE" in
              *[!0]*) echo "range=$PUSH_BEFORE..$PUSH_AFTER" >> "$GITHUB_OUTPUT" ;;
              *)      echo "range=$PUSH_AFTER -n 1" >> "$GITHUB_OUTPUT" ;;
            esac
          fi
      - name: Reject breaking-change markers
        env:
          RANGE: ${{ steps.range.outputs.range }}
        run: |
          offenders=$(git rev-list $RANGE | while read -r sha; do
            subject=$(git show -s --format='%s' "$sha")
            body=$(git show -s --format='%b' "$sha")
            if printf '%s\n' "$subject" | grep -Eq '^[a-z]+(\([^)]+\))?!:' \
               || printf '%s\n' "$body" | grep -Eq '^BREAKING[ -]CHANGE:'; then
              printf '%s %s\n' "$(git show -s --format='%h' "$sha")" "$subject"
            fi
          done)
          if [ -n "$offenders" ]; then
            echo "::error::Breaking-change commit(s) found (pre-1.0, must stay on v0.x):"
            echo "$offenders"
            exit 1
          fi
          echo "No breaking-change markers. OK."
